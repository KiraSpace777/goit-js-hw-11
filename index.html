<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goit-js-hw-11</title>
    <script type="module" crossorigin src="/goit-js-hw-11/index.js"></script>
    <link rel="stylesheet" crossorigin href="/goit-js-hw-11/assets/index-DvPDDfy5.css">
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="nav">
          <a class="nav-logo" href="./index.html" aria-label="Site logo">
            <svg class="nav-logo-icon" width="100" height="30">
              <use href="/goit-js-hw-11/assets/sprite-E8vg0sBb.svg#logo"></use>
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="main-title nav-item">Gallery</h1>

      <ul class="gallery"></ul>
      <div class="wrapper">
        <!-- Форма пошуку -->
        <form id="search-form" class="search-form">
          <div class="form-group">
            <label for="photo-input">Оберіть зображення</label>
            <input
              list="photo-list"
              id="photo-input"
              class="input-field"
              placeholder="Наприклад: ..."
              autocomplete="off"
            />
            <datalist id="photo-list"></datalist>
          </div>

          <button type="submit" class="btn">Знайти зображення</button>
        </form>

        <!-- Лоадер -->
        <div id="loader" class="loader hidden">
          <p>Завантаження...</p>
        </div>
      </div>

      <!-- Контейнер для картки -->
      <div id="photo-card" class="card-container"></div>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-desc">Made with ✨ by Anna K.</p>
      </div>
    </footer>

  </body>
</html>
